<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h1 class="h3 mb-3">Crea un account</h1>

                <form method="post">
                    {% csrf_token %}

                    {{ form.as_p }}

                    <button class="btn btn-primary" type="submit">
                        Registrati
                    </button>
                </form>

                <p class="mt-3 mb-0">
                    Hai già un account?
                    <a href="{% url 'login' %}">Accedi</a>
                </p>
            </div>
        </div>
    </div>
</div>

{% endblock %}

</body>
</html>
