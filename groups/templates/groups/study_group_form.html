<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <h1 class="h3 mb-3">{{ title }}</h1>

                <form method="post">
                    {% csrf_token %}

                    {{ form.as_p }}

                    <button class="btn btn-primary" type="submit">
                        Salva
                    </button>

                    <a class="btn btn-outline-secondary" href="{% url 'organizer_dashboard' %}">
                        Annulla
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}

</body>
</html>
